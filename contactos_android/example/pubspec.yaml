name: contactos_example
description: Testbed for the contactos plugin implementation for Android.
publish_to: 'none'
version: 0.0.1


environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.38.3"


dependencies:
  flutter:
    sdk: flutter

  contactos_android:
    # When depending on this package from a real application you should use:
    #   contactos: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../

  intl: any
  collection: any
  cupertino_icons: any

  permission_handler: ^12.0.1


dev_dependencies:
  # Integration tests for Flutter
  integration_test:
    sdk: flutter
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
